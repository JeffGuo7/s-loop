<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snotra</title>
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Preload: route AI API calls through the Rust HTTP proxy (no CORS).
      // Only triggers for known AI provider domains.
      ;(function() {
        var __origFetch = window.fetch.bind(window)
        var __invoke = window.__TAURI_INTERNALS__?.invoke

        window.fetch = function(input, init) {
          var url = (typeof input === 'string' ? input : input?.url) || ''
          
          // Only proxy providers that lack CORS headers.
          // Anthropic, OpenAI, DeepSeek, Google, etc. all support CORS.
          var isAiApiCall = 
            url.includes('opencode.ai')
          
          if (isAiApiCall && __invoke) {
            var headers = init?.headers 
              ? Object.fromEntries(new Headers(init.headers).entries())
              : {}
            var body = typeof init?.body === 'string' 
              ? init.body 
              : init?.body ? JSON.stringify(init.body) : ''
            
            return __invoke('ai_proxy', {
              request: {
                url: url,
                method: init?.method?.toString() || 'POST',
                headers: headers,
                body: body,
              }
            }).then(function(response) {
              return new Response(response.body, {
                status: response.status,
                headers: new Headers(response.headers)
              })
            }).catch(function(err) {
              return new Response(JSON.stringify({ error: String(err) }), {
                status: 500,
                headers: new Headers({ 'Content-Type': 'application/json' })
              })
            })
          }
          
          return __origFetch(input, init)
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
