<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snotra</title>
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Preload: override fetch BEFORE any ESM modules load.
      // Uses __TAURI_INTERNALS__.invoke (available in Tauri webview)
      // to route AI API calls through the Rust HTTP proxy (no CORS).
      ;(function() {
        var __origFetch = window.fetch.bind(window)
        var __invoke = window.__TAURI_INTERNALS__?.invoke

        window.fetch = function(input, init) {
          var url = (typeof input === 'string' ? input : input?.url) || ''
          
          var isAiApiCall = 
            url.includes('opencode.ai') ||
            url.includes('anthropic.com') ||
            url.includes('openai.com') ||
            url.includes('googleapis.com') ||
            url.includes('deepseek.com') ||
            url.includes('api.groq.com') ||
            url.includes('openrouter.ai') ||
            url.includes('mistral.ai') ||
            url.includes('xai') ||
            url.includes('cerebras') ||
            url.includes('together.xyz') ||
            url.includes('api.cloudflare.com')
          
          if (isAiApiCall && __invoke) {
            var headers = init?.headers 
              ? Object.fromEntries(new Headers(init.headers).entries())
              : {}
            var body = typeof init?.body === 'string' 
              ? init.body 
              : init?.body ? JSON.stringify(init.body) : ''
            
            // Route through Rust proxy via Tauri invoke
            return __invoke('ai_proxy', {
              request: {
                url: url,
                method: init?.method?.toString() || 'POST',
                headers: headers,
                body: body,
              }
            }).then(function(response) {
              return new Response(response.body, {
                status: response.status,
                headers: new Headers(response.headers)
              })
            }).catch(function(err) {
              return new Response(JSON.stringify({ error: String(err) }), {
                status: 500,
                headers: new Headers({ 'Content-Type': 'application/json' })
              })
            })
          }
          
          return __origFetch(input, init)
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
